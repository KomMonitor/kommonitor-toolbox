@if (error()) {
  <p class="status status--error">{{ error() }}</p>
} @else {
  <div class="map-wrapper">
    @if (loading()) {
      <p class="status">Daten werden geladen …</p>
    }
    <lib-map
      class="map"
      [center]="effectiveCenter()"
      [zoom]="effectiveZoom()"
      [fitToData]="autoFit()"
      [layers]="layers()"
    ></lib-map>
  </div>

  @if (showLegend() && hasData()) {
    <div class="legend">
      @for (cls of legendClasses(); track $index) {
        <span class="legend__item">
          <span class="legend__swatch" [style.background]="cls.color"></span>
          <span class="legend__label">{{ legendLabel(cls) }}</span>
        </span>
      }
      @if (unit()) {
        <span class="legend__unit">{{ unit() }}</span>
      }
    </div>
  }
}
